openapi: 3.0.3
info:
  title: WASAtext
  description:  |
    This API allow multiple users to chat with each other,
    one-to-one or by creating group chat, an user can start
    new conversation by searching other user, or add them to
    an existing chat to create a group.
  version: 0.2.1fray

servers:
  - url: http://localhost:3000
    description: Local development server

tags:
  - name: Login 
    description: Operations relative to the login of the user
  
  - name: User operation
    description: Operations relative to the user, such as change or get name/propic, ecc
  
  - name: Chat operation
    description: Operations relative to the chat, such retrive the user's chat, retrive a chat name, ecc
  
  - name: Group chat operation
    description: Operations relative to the group chat
  
  - name: Message operation
    description: Operations relative to the messages, such as send a message, change the status to read message, delete it, ecc


components:
  parameters:
    usr_id:
      description:  |
        Unique user id
      
      schema:
        $ref: "#/components/schemas/User/properties/usrId"
      name: usr_id
      in: path
      required: true
      
    chat_id:
      description:  |
        Unique chat id
      
      schema:
        $ref: "#/components/schemas/Chat/properties/chatId"
      name: chat_id
      in: path
      required: true
    
    msg_id:
      description: |
        Unique message id
      
      schema:
        $ref: "#/components/schemas/Message/properties/msgId"
      name: msg_id
      in: path
      required: true
    

  schemas:
    User:
      description:  |
        Contain information about an user of the app,
        such as its name, user id, and profile photo.
      
      type: object
      title: User

      properties:
        usrId:
          description:  |
            Unique user id
      
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"
          
          minLength: 3
          maxLength: 32
          readOnly: true
        
        userName:
          description:  |
            Username
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "franco"
          
          minLength: 3
          maxLength: 16
        
        userPhoto:
          description:  |
            User profile photo (propic) encoded in base64
          
          type: string
          format: binary
          example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
          
          maxLength: 1398101 #Equivalente di 1MB di dati binari in base64
    
    Chat:
      description:  |
        Contain information about a chat of two or more users,
        such as the name of the chat, the propic the participants
        and the id.

      type: object
      title: Chat
      
      properties:
        chatId:
          description:  |
            Unique chat id
          
          type: integer
          
          minimum: 0
          readOnly: true

        chatName:
          description:  |
            Chat name, if it's a one-to-one chat the name
            correspond to the other username
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "Chat Uni"
          
          minLength: 3
          maxLength: 16

        chatPhoto:
          description:  |
            Chat Photo, if it's a one-to-one chat is the propic of the other user,
            else contain the group photo
          
          type: string
          format: binary
          example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."

          minLength: 0
          maxLength: 1398101

        isGroup:
          description:  |
            Used to distinguish group chat between one-to-one chat_id.
            false: one-to-one chat with only 2 users
            true: chat with more than 2 users
            
          type: boolean

        participants:
          description:  |
            Array containing the users id of the users in the chat
          
          type: array
          minItems: 2
          maxItems: 64
          items:
            $ref: "#/components/schemas/User/properties/usrId"

    Message:
      description:  |
        Contain the message content, and other parameter such as:<br>
        msg_id, senderId, contentType(if a photo or a text message),
        message_content, delivery status, comment and like/dislike
      
      type: object
      title: Message
      
      properties:
        msgId:
          description:  |
            Unique message id
          
          type: integer
          minimum: 0
          readOnly: true
        
        senderId:
          description:  |
            Correspond to the usr_id of the user that sended the message
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"

          minLength: 3
          maxLength: 32
          readOnly: true

        contentType:
          description:  |
            Describe if the content of the message is a photo o a text
          
          type: string
          enum:
          - photo
          - text
        
        content:
          description:  |
            Content of the message, can be a text OR a photo
          
          oneOf:
            - description:  |
                Text content
              
              type: string
              pattern: '^(?!\s*$).+'
              example: "Ciao franco, come stai?"

              minLength: 1
              maxLength: 1024

            - description:  |
                Photo content

              type: string
              format: binary
              pattern: '^.*$'
              example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
              
              minLength: 0
              maxLength: 2787949
        
        deliveryStatus:
          description:  |
            Enum string used for set the status of a message:<br>
              - sent: the receiver user isn't connected to the app<br>
              - received: the user received the message but he didn't read it<br>
              - read: read by the user
          
          type: string
          enum:
            - sent
            - received
            - read

        timestamp:
          description:  |
            Define the time of when the message was sent
          
          type: string
          format: date-time
          example: "2021-06-01T14:10:27Z"

          minLength: 18
          maxLength: 22
        
        comments:
          description:  |
            Array of comments/reaction of a message,
            a message can have maximum 16 comments
          
          type: array
          minItems: 0
          maxItems: 16
          items:
            $ref: "#/components/schemas/Comment"
    
    Comment:
      description:  |
        Schema for the comment (reaction with emoji) section of a message
        it have the content of the comment (one emoji) the user who leaved the
        comment and a comment id that its connected to the message

      type: object
      title: Comment

      properties:
        commenterId:
          description:  |
            Comment id of the user who commented the message

          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"

          minLength: 3
          maxLength: 32
          readOnly: true

        content:
          description:  |
            Content of the comment, it's an emoji in utf-8
          
          type: string
          pattern: '^.*$'
          example: "😀"

          minLength: 1
          maxLength: 1

    Error:
      description: Personalizable error
      type: object
      properties:
        content:
          description: Short description of the error

          type: string
          pattern: "^.*$"

          minLength: 3
          maxLength: 40
          example: "token expired"

        code:
          description: Error code

          type: string
          pattern: "^[A-Z0-9 ]+$"

          minLength: 3
          maxLength: 20
          example: "TOKEN NOT VALID"

  responses:
    UnauthorizedError:
      description: Unauthorized - Authentication required or failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    InternalError:
      description: Internal Server Error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    BadRequestError:
      description: Bad request - requestBody not valid or empty
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    OperationNotAllowed:
      description: Forbidden - the operation is not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

    NotFoundError:
      description: Not found - the content requested was not found in the database
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  securitySchemes:
    BearerAuth:
      description:  |
        Define the security scheme for the api, in this case it's used Bearer Token,<br>
        and the token correspond to the usr_id
      type: http
      scheme: bearer
      bearerFormat: plain



paths:
  /session:                                                       #Endpoint per il login
    post:
      description:  |
        If the user does not exist, it will be created,
        and an identifier is returned.
        If the user exists, the user identifier is returned.
      summary: Logs in the user

      tags: ["Login"]
      operationId: doLogin

      requestBody:
        description: Username required for loggin in
        required: true
        content:
          application/json:
            schema:
              description:  |
                Request the name of the user
              type: object
              properties:
                userName:
                  $ref: "#/components/schemas/User/properties/userName"

            example:
              userName: "franco"

      responses:
        "201":
          description: User log-in action successful
          content:
            application/json:
              schema:
                description:  |
                    Response with the unique user id

                type: object
                properties:
                  usrId: 
                    $ref: "#/components/schemas/User/properties/usrId"
              
              example:
                usrId: "ofnarc754"
        "400":
          $ref: "#/components/responses/BadRequestError"

        "500":
          $ref: "#/components/responses/InternalError"

  #-----------------
  # USER ENDPOINTS
  #-----------------

  /users:                                                         #Endpoint degli utenti dell'app
    get:
      description:  |
        Consent to show all the users of the WASAtext, useful when an user
        want to start a new conversation, or add another user to a group
      summary: List all users

      tags: ["User operation"]
      operationId: showAllUsers

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description: Show an array that contain all the users of the WASAText
          content:
            application/json:
              schema:
                description:  |
                  Array of users
                
                type: object
                properties:
                  users:
                    description:  |
                      Array of all the users of the app
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                    
                    minItems: 0
                    maxItems: 256
          
              example:
                users:
                  - usr_id: "franco245"
                    userName: "franco"
                    userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  - usr_id: "maria34"
                    userName: "maria"
                    userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."

        "401":
         $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
  
  /users/{usr_id}:                                                #Endpoint di un utente
    parameters:
      - $ref: "#/components/parameters/usr_id"
    
    get:
      description:  |
        Retrive the photo and name of an user by its usr_id,
        useful for when an user want se info of other user in
        a chat or group
      summary: Get user info

      tags: ["User operation"]
      operationId: getUserInfo

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description:  |
            Information retrived successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              
              example:
                usrId: "ofnarc754"
                userName: "franco"
                userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

    
    patch:
      #uso patch perché voglio modificare SOLO il nome dell'utente,
      #quindi un aggiornamento parziale di un elemento già esistente
      description:  |
        Update only the username leaving invariated the id and photo,
        using patch method i form a request body that can contain only 
        the "userName"
      summary: Change the username
      
      tags: ["User operation"]
      operationId: setMyUserName

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the userName field compatible
                with the one described in the user schema 
              
              type: object
              properties:
                newUserName:
                  description:  |
                    New user name

                  type: string
                  pattern: '^[^\s].*[^\s]$'

                  minLength: 3
                  maxLength: 16
      
      responses:
        "202":
          description: Username updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the username updated
                
                type: object
                properties:
                  userName:
                    $ref: "#/components/schemas/User/properties/userName"
              
              example:
                userName: "francofronco"

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
  
  /users/{usr_id}/propic:                                         #Enpoint per la propic di un utente
    parameters:
      - $ref: "#/components/parameters/usr_id"
    
    patch:
      description:  |
        Update only the photo leaving invariated the id and the name
      summary: Change the propic

      tags: ["User operation"]
      operationId: setMyPhoto
      
      security:
        - BearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the photo field compatible
                with the one described in the user schema 
              
              type: object
              properties:
                newUserPhoto:
                  description:  |
                    New value of the key, the new photo in this case

                  type: string
                  format: binary
                  example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  
                  minLength: 0
                  maxLength: 1398101
      
      responses:
        "202":
          description: Photo updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the propic updated
                
                type: object
                properties:
                  userPhoto:
                    $ref: "#/components/schemas/User/properties/userPhoto"
              
              example:
                userPhoto: "iVBORw0KGgoAAAANSUhUEgAUAAAA..."
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
  
  #-----------------
  # CHAT ENDPOINTS
  #-----------------

  /chats:                                                         #Endpoint delle chat
    get:
      description:  |
        Return an array that contain all the chats of a single user
      summary: List the chat of the user
      
      tags: ["Chat operation"]
      operationId: getMyConversations

      security:
        - BearerAuth: []

      responses:
        "200":
          description:  |
            The response contain a json object composed by an array with all(32 for now) the user chat
          content:
            application/json:
              schema:
                description: List with all user chat
                type: object
                properties:
                  chats:
                    description: user chats

                    type: array
                    items:
                      $ref: "#/components/schemas/Chat"
                    
                    minItems: 0
                    maxItems: 32
              
              example:
                chats:
                  - chat_id: 234
                    chatName: "Chat Uni"
                    chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                    isGroup: true
                    participants: ["ofnarc754", "arima53", "odfn34"]

                  - chat_id: 254
                    chatName: "Roberto"
                    chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                    isGroup: false
                    participants: ["ofnarc754", "ordigro293"]

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

    post:
      description:  |
        Consent the user to start a new chat with one or more user/s
      summary: Start new chat

      tags: ["Chat operation"]
      operationId: startNewChat

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              description:  |
                The request body expect to retrieve the chat type, (name and photo if it's a group
                if isn't a group they can be empty) and it's participants minus the user that is starting the chat

              type: object
              properties:
                chatName:
                  $ref: "#/components/schemas/Chat/properties/chatName"

                chatPhoto:
                  $ref: "#/components/schemas/Chat/properties/chatPhoto"

                isGroup:
                  $ref: "#/components/schemas/Chat/properties/isGroup"

                participants:
                  $ref: "#/components/schemas/Chat/properties/participants"

      responses:
        "201":
          description: Response with the chat info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

              example:
                chatId: 123
                chatName: "Chat Uni"
                chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                isGroup: true
                participants: ["ofnarc754", "arima53", "odfn34"]


        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "500":
          $ref: "#/components/responses/InternalError"

