              schema:
                description:  |
                  Array of comments
                
                type: object
                properties:
                  comments:
                    description:  |
                      maxium number of comment is 16

                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                    
                    minItems: 0
