        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chat/{chat_id}:
    parameters:
      - $ref: "#/components/parameters/chat_id"

    get:
      description:  |
        Retrive all the info of the chat
      summary: Get chat info

      tags: ["Chat operation"]
      operationId: getChatInfo

      security:
        - BearerAuth: []

      responses:
        "200":
          description: |
            Information retrived successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"

              example:
                chat_id: 344
                chatName: "Franco"
                chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                isGroup: false
                participants: ["ofnarc754", "arima53"]

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chats/{chat_id}/propic:                                        #Endpoint della propic di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    patch:
      description:  |
        Update only the group chat leaving invariated the other properties
      summary: Change the group chat photo

      tags: ["Group chat operation"]
      operationId: setGroupPhoto
      
      security:
        - BearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the chatPhoto field compatible
                with the one described in the chat schema 
              
              type: object
              properties:
                newGroupPhoto:
                  $ref: "#/components/schemas/Chat/properties/chatPhoto"
      
      responses:
        "200":
          description: Photo updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the updated photo
                type: object
                properties:
                  chatPhoto:
                    $ref: "#/components/schemas/Chat/properties/chatPhoto"
              
              example:
                chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chats/{chat_id}/users:                                         #Endpoint degli utenti di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    post:
      description:  |
        Add an user to the chat, by inserting the usr_id
        of the user in the array of participants
      summary: Add an user to a group

      tags: ["Group chat operation"]
      operationId: addToGroup

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          usr_id of the user to be added to the chat
        
        content:
          application/json:
            schema:
              description:  |
                schema for the user id

              type: object
              properties:
                usrId:
                  $ref: "#/components/schemas/User/properties/usrId"
      
      responses:
        "201":
          description: User added successfully, return the list of partecipant refreshed
          content:
            application/json:
              schema:
                description:  |
                  List with the participants of the chat included the new added
                
                type: object
                properties:
                  users:
                    description: Users of the chat

                    type: array
                    items:
                        $ref: "#/components/schemas/User"
              
                    minItems: 1
                    maxItems: 32
              
              example:
                users:
                  - User1:
                      usr_id: "franco245"
                      userName: "franco"
                      userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  - User2:
                      usr_id: "maria34"
                      userName: "maria"
                      userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "204":
          description: No content, user is already in the chat
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chats/{chat_id}/users/{usr_id}:                                #Endpoint di un utente di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/usr_id"
    
    delete:
      description:  |
        The user leave the chat, so the user is removed from the users of the chat
        and all its message will be removed from the history
      summary: Leave a group chat

      tags: ["Group chat operation"]
      operationId: leaveGroup

      security:
        - BearerAuth: []
      
      responses:
        "204":
          description: User successfully leaved the chat
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
    
  #-----------------
  # MESSAGE
  #-----------------

  /chats/{chat_id}/messages:                                      #Endpoint dei messaggi di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    get:
      description:  |
        Retrieve most of the messages of the chat ordered from the newest to the oldest
      summary: Get chat messages

      tags: ["Chat operation"]
      operationId: getConversation

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description:  |
            Messages retrieved successfully
          content:
            application/json:
              schema:
                description:  |
                  Array of message composed by id, senderId, timestamp and content of the message
                type: object
                properties:
                  messages:
                    description:  |
                      chat message maximum 256

                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                    
                    minItems: 1
                    maxItems: 256
              example:
                messages:
                  - Message1:
                      msgId: 3
                      senderId: "ofnarc754"
                      contentType: "photo"
                      content: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      deliveryStatus: "sent"
                      timestamp: "2021-06-01T14:10:27Z"
                      comments: ["😒"]
                  - Message2:
                      msgId: 345
                      senderId: "ordigro293"
                      contentType: "text"
                      content: "Ciao franco!!"
                      deliveryStatus: "read"
                      timestamp: "2021-06-01T16:10:27Z"
                      comments: ["😊"]
                  - Message3:
                      msgId: 266
                      senderId: "maria34"
                      contentType: "photo"
                      content: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      deliveryStatus: "read"
                      timestamp: "2021-06-01T18:10:27Z"
                      comments: ["😊", "😒"]
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

    post:
      description:  |
        Send a message in the chat, the user is identified by the auth token.
      summary: Send message

      tags: ["Message operation"]
      operationId: sendMessage

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          The message that the user want to send, in the request are present: <br>
          - User id of the user that send the message
          - the content type of the message
          - the content of the message
          - timestamp
        content: 
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
        
      responses:
        "204":
          description: Message sent succesfully
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
  
  /chats/{chat_id}/messages/{msg_id}:                             #Endpoint di un messaggio di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
    
    delete:
      description: Delete a specific message from the chat by it msg_id.
      summary: Delete a message

      tags: ["Message operation"]
      operationId: deleteMessage

      security:
        - BearerAuth: []
      
      responses:
        "204":
          description: Message deleted successfully

        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
    
    post:
      description:  |
        Forward a message to the chat that its id is passed in the query in the value "forward_to_chat"
