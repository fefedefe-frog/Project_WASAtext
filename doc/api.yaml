openapi: 3.0.3
info:
  title: WASAtext
  description:  |
    This API allow multiple users to chat with each other,
    one-to-one or by creating group chat, an user can start
    new conversation by searching other user, or add them to
    an existing chat to create a group.
  version: 0.2.1fray

#capire come gestire i vari array di schemas, es utenti in chat, messaggi in chat, commenti dei messaggi

tags:
  - name: Login 
    description: Opeartions relative to the login of the user
  
  - name: User operation
    description: Operations relative to the user, such as change or get name/propic, ecc
  
  - name: Chat operation
    description: Operations relative to the chat, such retrive the user's chat, retrive a chat name, ecc
  
  - name: Group chat operation
    description: Operations relative to the group chat
  
  - name: Message operation
    description: Operations relative to the messages, such as send a message, change the status to read message, delete it, ecc


components:
  parameters:
    usr_id:
      description:  |
        Unique user id
      
      schema:
        $ref: "#/components/schemas/User/properties/usrId"
      name: usr_id
      in: path
      required: true
      
    chat_id:
      description:  |
        Unique chat id
      
      schema:
        $ref: "#/components/schemas/Chat/properties/chatId"
      name: chat_id
      in: path
      required: true
    
    msg_id:
      description: |
        Unique message id
      
      schema:
        $ref: "#/components/schemas/Message/properties/msgId"
      name: msg_id
      in: path
      required: true
    

  schemas:
    User:
      description:  |
        Contain information about an user of the app,
        such as its name, user id, and profile photo.
      
      type: object
      title: User

      properties:
        usrId:
          description:  |
            Unique user id
      
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"
          
          minLength: 3
          maxLength: 32
          readOnly: true
        
        userName:
          description:  |
            Username
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "franco"
          
          minLength: 3
          maxLength: 16
        
        userPhoto:
          description:  |
            User profile photo (propic) encoded in base64
          
          type: string
          format: binary
          example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
          
          maxLength: 1398101 #Equivalente di 1MB di dati binari in base64
    
    Chat:
      description:  |
        Contain information about a chat of two or more users,
        such as the name of the chat, the propic the partecipants
        and the id.

      type: object
      title: Chat
      
      properties:
        chatId:
          description:  |
            Unique chat id
          
          type: integer
          
          minimum: 0
          readOnly: true
        
        chatName:
          description:  |
            Chat name, if it's a one-to-one chat the name
            correspond to the other username
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "Chat Uni"
          
          minLength: 3
          maxLength: 16
          
        chatPhoto:
          description:  |
            Chat Photo, if it's a one-to-one chat is the propic of the other user,
            else contain the group photo
          
          type: string
          format: binary
          example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
          
          maxLength: 1398101
        
        chatType:
          description:  |
            Used to distinguish group chat between one-to-one chat_id.(not really usefull for now)
            1to1: one-to-one chat with only 2 users
            group: chat with more than 2 users
            
          type: string
          enum:
          - one_to_one
          - group
          
        partecipants:
          description:  |
            Array containing the users id of the users in the chat
          
          type: array
          minItems: 2
          maxItems: 64
          items:
            type: object
            properties:
              usrId:
                $ref: "#/components/schemas/User/properties/usrId"

    
    Message:
      description:  |
        Contain the message content, and other parameter such as:<br>
        msg_id, senderId, contentType(if a photo or a text message),
        message_content, delivery status, comment and like/dislike
      
      type: object
      title: Message
      
      properties:
        msgId:
          description:  |
            Unique message id
          
          type: integer
          minimum: 0
          readOnly: true
        
        senderId:
          description:  |
            Correspond to the usr_id of the user that sended the message
          
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"

          minLength: 3
          maxLength: 32
          readOnly: true

        contentType:
          description:  |
            Describe if the content of the message is a photo o a text
          
          type: string
          enum:
          - photo
          - text
        
        content:
          description:  |
            Content of the message, can be a text OR a photo
          
          oneOf:
            - description:  |
                Text content
              
              type: string
              pattern: '^(?!\s*$).+'
              example: "Ciao franco, come stai?"

              minLength: 1
              maxLength: 1024

            - description:  |
                Photo content

              type: string
              format: binary
              pattern: '^.*$'
              example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
              
              minLength: 0
              maxLength: 2787949
        
        deliveryStatus:
          description:  |
            Enum string used for set the status of a message:<br>
              - 0: the receiver user isn't connected to the app<br>
              - 1: the user received the message but he didn't read it<br>
              - 2: read by the user
          
          type: integer
          minimum: 0
          maximum: 2
        
        timestamp:
          description:  |
            Define the time of when the message was sent
          
          type: string
          format: date-time
          example: "2021-06-01T14:10:27Z"

          minLength: 18
          maxLength: 22
        
        comments:
          description:  |
            Array of comments/reaction of a messsage,
            a message can have maximum 16 comments
          
          type: array
          minItems: 0
          maxItems: 16
          items:
            $ref: "#/components/schemas/Comment"
    
    Comment:
      description:  |
        Schema for the comment (reaction with emoji) section of a message
        it have the content of the comment (one emoji) the user who leaved the
        comment and a comment id that its connected to the message

      type: object
      title: Comment

      properties:
        commenterId:
          description:  |
            Comment id of the user who commented the message

          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"

          minLength: 3
          maxLength: 32
          readOnly: true

        content:
          description:  |
            Content of the comment, it's an emoji in utf-8
          
          type: string
          pattern: '^.*$'
          example: "😀"

          minLength: 1
          maxLength: 1
                  

  securitySchemes:
    BearerAuth:
      description:  |
        Define the security scheme for the api, in this case it's used Bearer Token,<br>
        and the token correspond to the usr_id
      type: http
      scheme: bearer
      bearerFormat: plain



paths:
  /session:                                                       #Endpoint per il login
    post:
      description:  |
        If the user does not exist, it will be created,
        and an identifier is returned.
        If the user exists, the user identifier is returned.
      summary: Logs in the user

      tags: ["Login"]
      operationId: doLogin

      requestBody:
        description: User details
        content:
          application/json:
            schema:
              description:  |
                Request the name of the user
              type: object
              properties:
                userName:
                  $ref: "#/components/schemas/User/properties/userName"
        required: true
      
      responses:
        "201":
          description: User log-in action successful
          content:
            application/json:
              schema:
                description:  |
                    Responde with the unique user id

                type: object
                properties:
                  usrId: 
                    $ref: "#/components/schemas/User/properties/usrId"
              
              example:
                usrId: "ofnarc754"
                

  #-----------------
  # USER ENDPOINTS
  #-----------------

  /users:                                                         #Endpoint degli utenti dell'app
    get:
      description:  |
        Consent to show all the users of the WASAtext, usefull when an user
        want to start a new conversation, or add another user to a group
      summary: List all users

      tags: ["User operation"]
      operationId: showAllUsers

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description: Show an array that contain all the users of the WASAText
          content:
            application/json:
              schema:
                description:  |
                  Array of users
                
                type: object
                properties:
                  users:
                    description:  |
                      Array of all the users of the app
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
                    
                    minItems: 0
                    maxItems: 256
          
              example:
                - usr_id: "franco245"
                  userName: "franco"
                  userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                - usr_id: "maria34"
                  userName: "maria"
                  userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
  
  /users/{usr_id}:                                                #Endpoint di un utente
    parameters:
      - $ref: "#/components/parameters/usr_id"
    
    get:
      description:  |
        Retrive the photo and name of an user by its usr_id,
        usefull for when an user want se info of other user in
        a chat or group
      summary: Get user info

      tags: ["User operation"]
      operationId: getUserInfo

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description:  |
            Information retrived successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              
              example:
                User:
                  usrId: "ofnarc754"
                  userName: "franco"
                  userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "400":
          description:  |
            Unable to retrive data
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description:  |
            user not found

    
    patch:
      #uso patch perché voglio modificare SOLO il nome dell'utente,
      #quindi un aggiornamento parziale di un elemento già esistente
      description:  |
        Update only the username leaving invariated the id and photo,
        using patch method i form a request body that can contain only one
        of the varius patch operation (in this case i want that isn't possible to
        do other operation with this endpoint), so i leaved an enum with only the "replace"
        option: i want that its able to rename only the "userName" value of the user schemas
        so i put it also in an enum.
      summary: Change the username
      
      tags: ["User operation"]
      operationId: setMyUserName

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the userName field compatible
                with the one described in the user schema 
              
              type: object
              properties:
                op:
                  description:  |
                    Operation required by patch, rename in this case

                  type: string
                  enum: ["replace"]
                
                path:
                  description:  |
                    Json path of the key to rename
                  
                  type: string
                  enum: ["/userName"]
                
                value:
                  description:  |
                    New value of the key, the new name in this case

                  type: string
                  pattern: '^[^\s].*[^\s]$'

                  minLength: 3
                  maxLength: 16
      
      responses:
        "202":
          description: Username updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the username updated
                
                type: object
                properties:
                  userName:
                    $ref: "#/components/schemas/User/properties/userName"
              
              example:
                userName: "francofronco"

        
        "400":
          description: Unable to rename
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid

        "404":
          description: User not found
  
  /users/{usr_id}/propic:                                         #Enpoint per la propic di un utente
    parameters:
      - $ref: "#/components/parameters/usr_id"
    
    patch:
      description:  |
        Update only the photo leaving invariated the id and the name
      summary: Change the propic

      tags: ["User operation"]
      operationId: setMyPhoto
      
      security:
        - BearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the photo field compatible
                with the one described in the user schema 
              
              type: object
              properties:
                op:
                  description:  |
                    Operation required by patch, rename in this case

                  type: string
                  enum: ["replace"]
                
                path:
                  description:  |
                    Json path of the key to rename
                  
                  type: string
                  enum: ["/userPhoto"]
                
                value:
                  description:  |
                    New value of the key, the new photo in this case

                  type: string
                  format: binary
                  example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  
                  minLength: 0
                  maxLength: 1398101
      
      responses:
        "202":
          description: Photo updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the propic updated
                
                type: object
                properties:
                  userPhoto:
                    $ref: "#/components/schemas/User/properties/userPhoto"
              
              example:
                userPhoto: "iVBORw0KGgoAAAANSUhUEgAUAAAA..."
        
        "400":
          description: Unable to change propic
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: User not found
  
  #-----------------
  # CHAT ENDPOINTS
  #-----------------

  /chats:                                                         #Endpoint delle chat
    get:
      description:  |
        Return an array that contain all the chats of a single user
      summary: List the chat of the user
      
      tags: ["Chat operation"]
      operationId: getMyConversations

      security:
        - BearerAuth: []

      responses:
        "200":
          description:  |
            The response contain a json object composed by an array with all(32 for now) the user chat
          content:
            application/json:
              schema:
                description: List with all user chat
                type: object
                properties:
                  chats:
                    description: user chats

                    type: array
                    items:
                      $ref: "#/components/schemas/Chat"
                    
                    minItems: 0
                    maxItems: 32
              
              example:
                chats:
                  - Chat1:
                      chat_id: 234
                      chatName: "Chat Uni"
                      chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      partecipants: ["ofnarc754", "arima53", "odfn34"]
                  - Chat2:
                      chat_id: 254
                      chatName: "Robero"
                      chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      partecipants: ["ofnarc754", "ordigro293"]
                  
        
        "400":
          description:  Unable to retrive chats
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid

  /chats/{chat_id}:                                               #Endpoint di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"

    delete:
      description:  |
        Delete a chat and it's content
      summary: Delete a chat

      tags: ["Chat operation"]
      operationId: deleteChat

      security:
        - BearerAuth: []

      responses:
        "202":
          description: Chat deleted successfully
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Chat not found
    
    get:
      description:  |
        Retrive only the name and the image of a chat identified
        by its chat_id. Usefull for something surely
      summary: Retrieve only chat name and photo

      tags: ["Chat operation"]
      operationId: getChatInfo

      security:
      - BearerAuth: []
      
      responses:
        "200":
          description: Response with only the name and image of the chat
          content:
            application/json:
              schema:
                description:  |
                  Schema with the chat name and photo
                
                type: object
                properties:
                  chatName:
                    description:  |
                      Chat name
                    
                    type: string
                    pattern: '^[^\s].*[^\s]$'
                    example: "Chat Uni"
                    
                    minLength: 3
                    maxLength: 16
                    
                  chatPhoto:
                    description:  |
                      Chat photo

                    type: string
                    format: binary
                    example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                    
                    maxLength: 1398101
              
              example:
                chatName: "Chat Uni"
                chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "400":
          description: Invalid request
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Chat not found
    
    patch:
      description:  |
        Update only the group name leaving invariated the other properties
      summary: Change the group chat name

      
      tags: ["Group chat operation"]
      operationId: setGroupName

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the chatName field compatible
                with the one described in the chat schema 
              
              type: object
              properties:
                op:
                  description:  |
                    Operation required by patch, rename in this case

                  type: string
                  enum: ["replace"]
                
                path:
                  description:  |
                    Json path of the key to rename
                  
                  type: string
                  enum: ["/chatName"]
                
                value:
                  description:  |
                    New value of the key, the new name in this case

                  type: string
                  pattern: '^[^\s].*[^\s]$'

                  minLength: 3
                  maxLength: 16
      
      responses:
        "202":
          description: Group chat name updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the updated chat name
                
                type: object
                properties:
                  chatName:
                    $ref: "#/components/schemas/Chat/properties/chatName"
              
              example:
                chatName: "Chat belli"
        
        "400":
          description: Unable to rename
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid

        "404":
          description: Group chat not found
  
  /chats/{chat_id}/propic:                                        #Endpoint della propic di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    patch:
      description:  |
        Update only the group chat leaving invariated the other properties
      summary: Change the group chat photo

      tags: ["Group chat operation"]
      operationId: setGroupPhoto
      
      security:
        - BearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the chatPhoto field compatible
                with the one described in the chat schema 
              
              type: object
              properties:
                op:
                  description:  |
                    Operation required by patch, rename in this case

                  type: string
                  enum: ["replace"]
                
                path:
                  description:  |
                    Json path of the key to rename
                  
                  type: string
                  enum: ["/chatPhoto"]
                
                value:
                  description:  |
                    New value of the key, the new name in this case

                  type: string
                  format: binary
                  example: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."

                  minLength: 0
                  maxLength: 1398101
      
      responses:
        "200":
          description: Photo updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the updated photo
                type: object
                properties:
                  chatPhoto:
                    $ref: "#/components/schemas/Chat/properties/chatPhoto"
              
              example:
                chatPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."

        
        "400":
          description: unable to change propic
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Group chat or photo not found

  /chats/{chat_id}/users:                                         #Endpoint degli utenti di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    post:
      description:  |
        Add an user to the chat, by inserting the usr_id
        of the user in the array of partecipants
      summary: Add an user to a group

      tags: ["Group chat operation"]
      operationId: addToGroup

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          usr_id of the user to be added to the chat
        
        content:
          application/json:
            schema:
              description:  |
                schema for the user id

              type: object
              properties:
                usrId:
                  $ref: "#/components/schemas/User/properties/usrId"
      
      responses:
        "201":
          description: User added successfully, return the list of partecipant refreshed
          content:
            application/json:
              schema:
                description:  |
                  List with the partecipants of the chat included the new added
                
                type: object
                properties:
                  users:
                    description: Users of the chat

                    type: array
                    items:
                        $ref: "#/components/schemas/User"
              
                    minItems: 1
                    maxItems: 32
              
              example:
                users:
                  - User1:
                      usr_id: "franco245"
                      userName: "franco"
                      userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                  - User2:
                      usr_id: "maria34"
                      userName: "maria"
                      userPhoto: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
        
        "204":
          description: No content, user is already in the chat
        
        "400":
          description: Invalid usr_id or chat_id
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid

        "404":
          description: Chat or user not found

  /chats/{chat_id}/users/{usr_id}:                                #Endpoint di un utente di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/usr_id"
    
    delete:
      description:  |
        Remove an user from the chat, and from the users array of the chat, used for when a user leave a group
      summary: Leave a group chat

      tags: ["Group chat operation"]
      operationId: leaveGroup

      security:
        - BearerAuth: []
      
      responses:
        "204":
          description: User successfully leaved the chat
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Chat or user not found
    
  #-----------------
  # MESSAGE
  #-----------------

  /chats/{chat_id}/messages:                                      #Endpoint dei messaggi di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
    
    get:
      description:  |
        Retrive most of the messages of the chat ordered from the newest to the oldest
      summary: Get chat messages

      tags: ["Chat operation"]
      operationId: getConversation

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description:  |
            Messages retrived successfully
          content:
            application/json:
              schema:
                description:  |
                  Array of message composed by id, senderId, timestamp and content of the message
                type: object
                properties:
                  messages:
                    description:  |
                      chat message maximum 256

                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
                    
                    minItems: 1
                    maxItems: 256
              example:
                messages:
                  - Message1:
                      msgId: 3
                      senderId: "ofnarc754"
                      contentType: "photo"
                      content: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      deliveryStatus: "sent"
                      timestamp: "2021-06-01T14:10:27Z"
                      comments: ["😒"]
                  - Message2:
                      msgId: 345
                      senderId: "ordigro293"
                      contentType: "text"
                      content: "Ciao franco!!"
                      deliveryStatus: "read"
                      timestamp: "2021-06-01T16:10:27Z"
                      comments: ["😊"]
                  - Message3:
                      msgId: 266
                      senderId: "maria34"
                      contentType: "photo"
                      content: "iVBORw0KGgoAAAANSUhEUgAAAAUA..."
                      deliveryStatus: "read"
                      timestamp: "2021-06-01T18:10:27Z"
                      comments: ["😊", "😒"]
        
        "400":
          description: Unable to retrive chat messages
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
    
    post:
      description:  |
        Send a message in the chat, the user is identified by the auth token.
      summary: Send message

      tags: ["Message operation"]
      operationId: sendMessage

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          The message that the user want to send, in the request are present: <br>
          - User id of the user that send the message
          - the content type of the message
          - the content of the message
          - timestamp
        content: 
          application/json:
            schema:
              $ref: "#/components/schemas/Message"
        
      responses:
        "204":
          description: Message sent succesfully
        
        "400":
          description: Unable to retrive the message
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Chat not found
  
  /chats/{chat_id}/messages/{msg_id}:                             #Endpoint di un messaggio di una chat
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
      - name: chat_to_forward
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
        description: The id of the chat where the message is forwarded
    
    delete:
      description: Delete a specific message from the chat by it msg_id.
      summary: Delete a message

      tags: ["Message operation"]
      operationId: deleteMessage

      security:
        - BearerAuth: []
      
      responses:
        "204":
          description: Message deleted successfully
        "400":
          description: Invalid request
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        "404":
          description: Message or chat not found
    
    post:
      description:  |
        Forward a message to the chat that its id is passed in the query in the value "forward_to_chat"
      summary: Forward a message

      tags: ["Message operation"]
      operationId: forwardMessage

      security:
        - BearerAuth: []

      requestBody:
        content:
          application/json:
            schema:
              description:  |
                The request body want the id of the user that is forwarding the message
              type: object
              properties:
                forwarderId:
                  $ref: "#/components/schemas/User/properties/usrId"

      responses:
        "204":
          description: Message forwarded correctly
        
        "400":
          description: Invalid request
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Message or chats not found

  /chats/{chat_id}/messages/{msg_id}/comments:                    #Endpoint dei commenti di un messaggio
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
    
    get:
      description:  |
        Retrive the comments of a message
      summary: Get comments for the message

      tags: ["Message operation"]
      operationId: getMessageComment

      security:
        - BearerAuth: []
      
      responses:
        "200":
          description:  |
            Comments retrived successfully

          content:
            application/json:
              schema:
                description:  |
                  Array of comments
                
                type: object
                properties:
                  comments:
                    description:  |
                      maxium number of comment is 16

                    type: array
                    items:
                      $ref: "#/components/schemas/Comment"
                    
                    minItems: 0
                    maxItems: 16
              
              example:
                comments:
                  - comment1:
                      commenterId: "ofnarc754"
                      content: "😊"
                  - comment2:
                      commenterId: "ordigro293"
                      content: "😒"

        
        "400":
          description: Unable to retrive comments of the message
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Comments or message not found
    
    post:
      description:  |
        Comment a message in the chat, the user is identified by the auth token.
      summary: Comment message

      tags: ["Message operation"]
      operationId: commentMessage

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          The comment that the user want to
        
        content: 
          application/json:
            schema:
              $ref: "#/components/schemas/Comment"
        
      responses:
        "204":
          description: Message commented succesfully
        
        "400":
          description: Unable to retrive the comment
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Comment or message not found

  /chats/{chat_id}/messages/{msg_id}/comments/{commenter_id}:     #Endpoint di un commento di un messaggio
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
      - name: commenter_id
        in: path
        required: true
        schema:
          type: string
          pattern: '^[^\s].*[^\s]$'
          example: "ofnarc754"

          minLength: 3
          maxLength: 32
          readOnly: true
        description:  |
          Id of the user that made the comment

    patch:
      description:  |
        Remove the comment from a message, by the commenterId
      summary: Uncomment a message

      tags: ["Message operation"]
      operationId: uncommentMessage

      security:
        - BearerAuth: []
      
      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                patch request for removing a comment, in that case we need only
                to know that we are removing the comment because the id of the comment
                is retrived from the path
              
              type: object
              properties:
                op:
                  description:  |
                    Operation to perform is to remove a comment
                  type: string
                  enum: ["remove"]
      
      responses:
        "202":
          description: Successfully uncommented the message
        
        "400":
          description: Unable to uncommented
        
        "401":
          description: Unauthorized - Authentication token is missing or invalid
        
        "404":
          description: Comment or message not found