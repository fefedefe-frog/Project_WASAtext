          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chats/{chat_id}/messages/{msg_id}/comments:                    #Endpoint dei commenti di un messaggio
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
    
    get:
      description:  |
        Retrive the comments of a message
      summary: Get comments for the message

      tags: ["Message operation"]
      operationId: getMessageComment

      security:
        - BearerAuth: []
      
      responses:
