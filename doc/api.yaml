    patch:
      description:  |
        Update only the group name leaving invariated the other properties
      summary: Change the group chat name

      
      tags: ["Group chat operation"]
      operationId: setGroupName

      security:
        - BearerAuth: []

      requestBody:
        required: true
        content:
          application/json-patch+json:
            schema:
              description:  |
                The request body expects to receive the chatName field compatible
                with the one described in the chat schema 
              
              type: object
              properties:
                newGroupName:
                  $ref: "#/components/schemas/Chat/properties/chatName"
      
      responses:
        "202":
          description: Group chat name updated successfully
          content:
            application/json:
              schema:
                description:  |
                  Return the updated chat name
                
                type: object
                properties:
                  chatName:
                    $ref: "#/components/schemas/Chat/properties/chatName"
              
              example:
                chatName: "Chat belli"
        
