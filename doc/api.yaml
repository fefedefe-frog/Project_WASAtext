          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"
    
    post:
      description:  |
        Comment a message in the chat, the user is identified by the auth token.
      summary: Comment message

      tags: ["Message operation"]
      operationId: commentMessage

      security:
        - BearerAuth: []
      
      requestBody:
        description:  |
          The comment that the user want to
        
        content: 
          application/json:
            schema:
              $ref: "#/components/schemas/Comment"
        
      responses:
        "204":
          description: Message commented succesfully
        
        "400":
          $ref: "#/components/responses/BadRequestError"

        "401":
          $ref: "#/components/responses/UnauthorizedError"

        "403":
          $ref: "#/components/responses/OperationNotAllowed"

        "404":
          $ref: "#/components/responses/NotFoundError"

        "500":
          $ref: "#/components/responses/InternalError"

  /chats/{chat_id}/messages/{msg_id}/comments/{commenter_id}:     #Endpoint di un commento di un messaggio
    parameters:
      - $ref: "#/components/parameters/chat_id"
      - $ref: "#/components/parameters/msg_id"
      - name: commenter_id
        in: path
